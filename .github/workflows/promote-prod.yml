name: Promote main to prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: promote-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-promote:
    name: Build and promote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Push tested commit to prod
        run: git push origin HEAD:prod
